<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sbbs</title>
  </head>
  <body>
    <style>
      html,
      body,
      pre,
      code,
      kbd,
      samp {
        font-family: "Press Start 2P", cursive;
        background: var(--body-bg);
        color: var(--body-text);
      }
    </style>
    <div class="index-navbar">
      <div class="container navbar-flex">
        <a href="index.html">
          <button type="button" class="nes-btn is-success">
            <b>index</b>
          </button>
        </a>
        <button type="button" class="nes-btn is-purple" id="btn_version">
          version
        </button>
        <span class="navbar-login">
          <button type="button" class="nes-btn is-primary" id="login_anonymous">
            anonymous
          </button>
          <button type="button" class="nes-btn is-primary" id="login_google">
            google
          </button>
        </span>
      </div>
    </div>
    <div class="index-body nes-text">
      <div class="main" id="version_info" style="display: none">
        <div class="version-row">
          <p class="nes-balloon from-right is-dark">
            <span class="nes-text is-primary">sbbs (simple bbs)</span
            ><br />
            <span class="nes-text is-error"
              >this page uses NES.CSS and Press_Start_2P font</span
            ><br />
            <span id="version"></span>
          </p>
          <i class="nes-octocat animate"></i>
        </div>
      </div>
      <div class="lists">
        <ul class="nes-list is-disc">
          <li style="font-size: 2em">
            views:
            <span class="nes-text is-success" id="viewcnt"></span>
          </li>
        </ul>
      </div>
      <p>
        <span id="load_img_buttons"> </span>
        <span id="upload_area" style="display: none">
          <button type="button" class="nes-btn is-warning" id="btn_upload">upload</button>
          <input
            type="file"
            id="file_input"
            style="display: none"
            multiple
            accept=".jpg,.jpeg,.png,.gif,.webp,.bmp,.svg,.mp4"
          />
        </span>
      </p>
      <div id="images" class="items"></div>
    </div>
    <script type="module" src="./src/index.js"></script>
  </body>
</html>
