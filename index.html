<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sbbs</title>
    <meta name="description" content="Simple BBS - retro-style bulletin board powered by Supabase">
    <meta property="og:title" content="sbbs">
    <meta property="og:description" content="Simple BBS - retro-style bulletin board powered by Supabase">
    <meta property="og:type" content="website">
  </head>
  <body>
    <style>
      html,
      body,
      pre,
      code,
      kbd,
      samp {
        font-family: "Press Start 2P", "Galmuri11", cursive;
        background: var(--body-bg);
        color: var(--body-text);
      }
    </style>
    <nav class="index-navbar" aria-label="Main navigation">
      <div class="container navbar-flex">
        <a href="index.html">
          <button type="button" class="nes-btn is-success">
            <b>index</b>
          </button>
        </a>
        <button type="button" class="nes-btn is-purple" id="btn_version">
          version
        </button>
        <button type="button" class="nes-btn is-disabled" id="btn_my_likes" disabled>
            ♥ my likes
          </button>
        <button type="button" class="nes-btn is-disabled" id="btn_upload" disabled>upload</button>
        <input type="file" id="file_input" style="display: none" multiple accept=".jpg,.jpeg,.png,.gif,.webp,.bmp,.svg,.mp4" />
        <span class="navbar-login">
          <button type="button" class="nes-btn is-primary" id="login_anonymous">
            anonymous
          </button>
          <button type="button" class="nes-btn is-primary" id="login_google">
            google
          </button>
        </span>
      </div>
    </nav>
    <main class="index-body nes-text">
      <div class="main" id="version_info" style="display: none">
        <div class="version-row">
          <p class="nes-balloon from-right is-dark">
            <span class="nes-text is-primary">sbbs (simple bbs)</span
            ><br />
            <span class="nes-text is-error"
              >this page uses NES.CSS and Press Start 2P font</span
            ><br />
            <span id="version"></span>
          </p>
          <i class="nes-octocat animate"></i>
        </div>
      </div>
      <div class="lists">
        <ul class="nes-list is-disc">
          <li style="font-size: 1.4em">
            views:
            <span class="nes-text is-success" id="viewcnt"></span>
          </li>
        </ul>
      </div>
      <p>
        <span id="load_img_buttons"> </span>
      </p>
      <div id="images" class="items"></div>
    </main>
    <script type="module" src="./src/index.js"></script>
  </body>
</html>
